name: Deploy MOI Website

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Deploy to VM
        uses: appleboy/ssh-action@v1.0.3
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
          VITE_CHATBOT_API: ${{ secrets.VITE_CHATBOT_API }}
          DATA_ROOM_CHAT_URL: ${{ secrets.DATA_ROOM_CHAT_URL }}
        with:
          host: ${{ secrets.VM_HOST }}
          username: ${{ secrets.VM_USERNAME }}
          key: ${{ secrets.VM_SSH_KEY }}
          envs: ANTHROPIC_API_KEY,OPENAI_API_KEY,SUPABASE_URL,SUPABASE_KEY,VITE_CHATBOT_API,DATA_ROOM_CHAT_URL
          script: |
            bash ~/scripts/deploy-moi-website.sh